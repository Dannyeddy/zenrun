<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen-Run App</title>
    <script>
      (function (locationRef) {
        if (locationRef.search[1] !== '/') {
          return;
        }

        var decodedPath = locationRef.search
          .slice(1)
          .split('&')
          .map(function (part) {
            return part.replace(/~and~/g, '&');
          })
          .join('?');

        window.history.replaceState(
          null,
          null,
          locationRef.pathname.slice(0, -1) + decodedPath + locationRef.hash,
        );
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
